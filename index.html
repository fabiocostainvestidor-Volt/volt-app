<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VOLT"/>
<meta name="theme-color" content="#09090F"/>
<title>VOLT</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2309090F'/><text y='.9em' font-size='72' x='12'>⚡</text></svg>"/>
<style>
:root{
  --bg:#09090F;--surf:#0F0F18;--card:#14141E;--bord:#1E1E2E;
  --acc:#C8FF00;--acc2:#8AB800;--glow:rgba(200,255,0,.12);--glow2:rgba(200,255,0,.05);
  --txt:#F0F0F8;--mut:#6B6B80;--sub:#1E1E2E;
  --red:#FF4D4D;--org:#FF8C42;--blu:#4D9FFF;--pur:#9B6DFF;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;color:var(--txt);height:100%;overflow:hidden}
input,select,button{font-family:inherit}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:0;height:0}
.page{position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding-bottom:calc(70px + var(--sab));display:none}
.page.active{display:block}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex;gap:8px;padding-bottom:4px}
.scroll-x::-webkit-scrollbar{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(200,255,0,.1)}50%{box-shadow:0 0 40px rgba(200,255,0,.3)}}

/* ── NAV ─────────────────────────────────────────── */
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);display:flex;padding:8px 0;padding-bottom:calc(8px + var(--sab));z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;border:none;background:none;cursor:pointer}
.nav-btn span:first-child{font-size:20px;transition:transform .15s}
.nav-btn .nav-lbl{font-size:9px;color:var(--mut);font-weight:500;transition:color .15s}
.nav-btn.active .nav-lbl{color:var(--acc);font-weight:700}
.nav-dot{width:16px;height:2px;border-radius:2px;background:var(--acc);margin-top:1px;display:none}
.nav-btn.active .nav-dot{display:block}

/* ── CARDS & UTILS ───────────────────────────────── */
.card{background:var(--card);border:1px solid var(--bord);border-radius:16px}
.badge{display:inline-block;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.5px}
.btn{width:100%;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s}
.btn-acc{background:var(--acc);color:#000}
.btn-ghost{background:var(--card);color:var(--txt);border:1px solid var(--bord)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--mut);text-transform:uppercase}
.field input,.field select{background:var(--surf);border:1.5px solid var(--bord);border-radius:12px;padding:13px 14px 13px 42px;font-size:15px;color:var(--txt);outline:none;width:100%;-webkit-appearance:none;transition:border-color .2s}
.field select{padding-left:14px}
.field input:focus,.field select:focus{border-color:rgba(200,255,0,.5)}
.field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.field-wrap{position:relative}
.section-title{color:var(--txt);font-weight:700;font-size:16px;margin-bottom:12px}
.muted{color:var(--mut);font-size:12px}
.row{display:flex;gap:10px;align-items:center}
.flex1{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.anim{animation:fadeUp .5s ease both}
.spinner{width:20px;height:20px;border:2.5px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}

/* ── SPLASH ─────────────────────────────────────── */
#splash{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:28px}
.logo-icon{width:80px;height:80px;border-radius:24px;background:var(--glow);border:2px solid rgba(200,255,0,.35);display:flex;align-items:center;justify-content:center;font-size:38px;animation:glow 3s ease infinite}
.logo-name{font-size:44px;font-weight:900;letter-spacing:-2px;color:var(--acc);line-height:1}
.logo-sub{font-size:13px;color:var(--mut)}
.feat-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:360px}
.feat-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:12px 14px}
.feat-row span:first-child{font-size:20px}
.feat-row span:last-child{font-size:13px;color:var(--txt)}

/* ── ONBOARDING ──────────────────────────────────── */
#onboarding{position:fixed;inset:0;background:var(--bg);z-index:998;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(var(--sat) + 20px) 18px 40px;display:none}
.steps-bar{display:flex;gap:5px;margin-bottom:24px}
.step-seg{flex:1;height:3px;border-radius:3px;background:var(--bord);transition:background .3s}
.step-seg.done{background:var(--acc)}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-card{background:var(--card);border:1.5px solid var(--bord);border-radius:14px;padding:16px 12px;cursor:pointer;transition:all .2s}
.opt-card.sel{background:var(--glow);border-color:var(--acc)}
.opt-card .oi{font-size:28px;margin-bottom:6px}
.opt-card .ol{color:var(--txt);font-weight:700;font-size:14px}
.opt-card.sel .ol{color:var(--acc)}
.opt-card .od{color:var(--mut);font-size:10px;margin-top:3px;line-height:1.4}

/* ── HOME ────────────────────────────────────────── */
.pad{padding:calc(var(--sat) + 16px) 16px 16px}
.avatar-btn{width:42px;height:42px;border-radius:14px;background:var(--glow);border:1px solid rgba(200,255,0,.4);display:flex;align-items:center;justify-content:center;color:var(--acc);font-weight:900;font-size:18px}
.xp-card{background:linear-gradient(135deg,var(--glow) 0%,var(--card) 100%);border:1px solid rgba(200,255,0,.4);border-radius:16px;padding:16px 18px}
.xp-bar-bg{height:4px;background:var(--bord);border-radius:4px;margin:10px 0 6px}
.xp-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:10px 6px;text-align:center}
.stat-val{color:var(--txt);font-weight:800;font-size:14px;margin-top:4px}
.stat-lbl{color:var(--mut);font-size:9px}
.prog-bar{height:4px;background:var(--bord);border-radius:4px;margin:10px 0}
.prog-fill{height:100%;border-radius:4px}
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.macro-item{text-align:center}
.macro-val{font-weight:700;font-size:13px}
.macro-lbl{color:var(--mut);font-size:9px;margin:3px 0}
.macro-bar{height:3px;background:var(--bord);border-radius:3px}
.macro-fill{height:100%;border-radius:3px}
.habit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.habit-card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:12px 14px}
.habit-icon{font-size:20px;margin-bottom:8px}
.habit-val{color:var(--txt);font-weight:700;font-size:14px}
.habit-lbl{color:var(--mut);font-size:11px}
.chart-svg{width:100%;height:60px}

/* ── TREINOS ─────────────────────────────────────── */
.split-btn{background:var(--card);border:1px solid var(--bord);border-radius:10px;color:var(--mut);font-size:11px;font-weight:500;padding:8px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.split-btn.active{background:var(--acc);border-color:var(--acc);color:#000;font-weight:800}
.workout-card{background:var(--card);border:1px solid var(--bord);border-radius:16px;overflow:hidden;margin-bottom:14px}
.wk-header{padding:14px 16px 10px;border-bottom:1px solid var(--bord)}
.wk-tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px}
.wk-name{color:var(--txt);font-weight:800;font-size:17px;margin-top:6px}
.wk-sub{color:var(--mut);font-size:11px;margin-top:2px}
.ex-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bord)}
.ex-row:last-of-type{border-bottom:none}
.ex-name{color:var(--txt);font-size:13px;font-weight:600}
.ex-sub{color:var(--mut);font-size:10px}
.ex-list{padding:8px 16px 0}
.more-ex{color:var(--mut);font-size:11px;text-align:center;padding:8px 0}

/* ── TREINO ATIVO ────────────────────────────────── */
#active-workout{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.aw-header{background:var(--surf);border-bottom:1px solid var(--bord);padding:calc(var(--sat) + 14px) 16px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.aw-timer{color:var(--acc);font-weight:800;font-size:22px}
.rest-banner{margin:12px 16px;background:var(--glow);border:1px solid rgba(200,255,0,.4);border-radius:14px;padding:16px;text-align:center}
.rest-time{color:var(--acc);font-weight:800;font-size:40px;line-height:1}
.ex-card{margin:0 16px 12px;background:var(--card);border:1px solid var(--bord);border-radius:16px;overflow:hidden}
.ex-visual{background:var(--sub);height:150px;display:flex;align-items:center;justify-content:center;position:relative}
.ex-visual-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,var(--glow),transparent 70%)}
.ex-muscles{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.muscle-tag{background:var(--glow);color:var(--acc);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
.ex-detail{padding:14px 16px}
.ex-title{color:var(--txt);font-weight:800;font-size:18px;margin-bottom:2px}
.ex-meta{color:var(--mut);font-size:12px;margin-bottom:12px}
.tip-box{background:var(--glow2);border:1px solid rgba(200,255,0,.2);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--txt)}
.log-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.log-field{background:var(--sub);border:1px solid var(--bord);border-radius:10px;padding:8px}
.log-label{color:var(--mut);font-size:9px;font-weight:700;letter-spacing:.5px;margin-bottom:5px}
.log-input{width:100%;background:transparent;border:none;color:var(--txt);font-size:18px;font-weight:700;text-align:center;outline:none;font-family:inherit}
.aw-ex-list{padding:0 16px 100px}
.aw-ex-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.aw-ex-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.aw-ex-cur{background:rgba(200,255,0,.2);color:var(--acc)}
.aw-ex-done{background:var(--acc);color:#000}
.aw-ex-pend{background:var(--sub);color:var(--mut)}
.aw-ex-name{color:var(--txt);font-size:13px;font-weight:600}
.aw-ex-sub{color:var(--mut);font-size:11px}
.prog-ring{position:relative;width:52px;height:52px;flex-shrink:0}
.prog-ring svg{transform:rotate(-90deg)}

/* ── BIBLIOTECA ──────────────────────────────────── */
.cat-btn{background:var(--card);border:1px solid var(--bord);border-radius:20px;color:var(--mut);font-size:11px;font-weight:500;padding:6px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.cat-btn.active{background:var(--acc);border-color:var(--acc);color:#000;font-weight:800}
.lib-item{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.lib-icon{width:36px;height:36px;border-radius:10px;background:var(--sub);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.lib-name{color:var(--txt);font-size:13px;font-weight:600}
.lib-mus{color:var(--mut);font-size:11px;margin-top:2px}
.lib-sets{color:var(--acc);font-size:12px;font-weight:700}

/* ── DETALHE EXERCÍCIO ───────────────────────────── */
#ex-detail{position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.detail-visual{background:var(--sub);height:180px;display:flex;align-items:center;justify-content:center;position:relative}

/* ── RECEITAS ────────────────────────────────────── */
.rec-cat-btn{flex:1;padding:9px;border:none;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s}
.rec-item{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:center;margin-bottom:10px;cursor:pointer}
.rec-icon{width:48px;height:48px;border-radius:14px;background:var(--sub);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.rec-name{color:var(--txt);font-weight:700;font-size:14px;line-height:1.3}
.rec-meta{color:var(--mut);font-size:11px;margin-top:3px}

/* ── DETALHE RECEITA ─────────────────────────────── */
#rec-detail{position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}

/* ── AI ──────────────────────────────────────────── */
#page-ai{padding-bottom:0}
.ai-header{padding:calc(var(--sat) + 14px) 16px 10px;border-bottom:1px solid var(--bord)}
.ai-status{color:var(--acc);font-size:10px;font-weight:600;display:flex;align-items:center;gap:5px}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--acc)}
.chat-wrap{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:8px;background:var(--glow);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.msg-bubble{max-width:78%;padding:10px 13px;font-size:13px;line-height:1.7;white-space:pre-wrap}
.msg-bubble.bot{background:var(--card);color:var(--txt);border-radius:14px 14px 14px 2px}
.msg-bubble.user{background:var(--acc);color:#000;font-weight:600;border-radius:14px 14px 2px 14px}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--mut);animation:pulse 1.2s infinite}
.quick-btns{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.quick-btns::-webkit-scrollbar{display:none}
.quick-btn{background:var(--glow2);border:1px solid rgba(200,255,0,.3);border-radius:20px;color:var(--acc);font-size:10px;padding:5px 10px;cursor:pointer;font-weight:600;white-space:nowrap;flex-shrink:0}
.ai-input-wrap{padding:8px 16px;border-top:1px solid var(--bord);background:var(--bg)}
.ai-input-row{display:flex;gap:8px}
.ai-input{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:12px 14px;color:var(--txt);font-size:14px;outline:none;font-family:inherit}
.ai-send{width:44px;height:44px;border-radius:12px;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* ── PROGRESSO ───────────────────────────────────── */
.pr-card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.pr-icon{width:38px;height:38px;border-radius:11px;background:var(--glow);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pr-name{color:var(--txt);font-weight:700;font-size:14px}
.pr-date{color:var(--mut);font-size:11px}
.pr-val{color:var(--acc);font-weight:800;font-size:16px;text-align:right}
.pr-delta{color:var(--acc);font-size:11px;text-align:right}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.badge-card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:12px 8px;text-align:center}
.badge-card.unlocked{background:var(--glow2);border-color:rgba(200,255,0,.4)}
.badge-icon{font-size:26px;margin-bottom:5px}
.badge-name{color:var(--txt);font-weight:700;font-size:11px}
.badge-card:not(.unlocked){opacity:.4;filter:grayscale(1)}

/* ── TOAST ───────────────────────────────────────── */
#toast{position:fixed;top:0;left:0;right:0;background:var(--acc);padding:14px 18px;display:flex;align-items:center;gap:10px;z-index:500;transform:translateY(-100%);transition:transform .3s}
#toast.show{transform:translateY(0)}
#toast span{color:#000;font-weight:800;font-size:14px;flex:1}

/* ── SEARCH ──────────────────────────────────────── */
.search-box{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.search-box input{flex:1;background:transparent;border:none;color:var(--txt);font-size:13px;outline:none;font-family:inherit}
</style>
</head>
<body>

<!-- ═══ TOAST ═══════════════════════════════════════════════ -->
<div id="toast"><span id="toast-msg"></span><button onclick="hideToast()" style="color:#000;font-size:18px">×</button></div>

<!-- ═══ SPLASH ══════════════════════════════════════════════ -->
<div id="splash">
  <div style="text-align:center;animation:fadeUp .8s ease">
    <div class="logo-icon" style="margin:0 auto 16px">⚡</div>
    <div class="logo-name">VOLT</div>
    <div class="logo-sub" style="margin-top:6px">Treino inteligente. Resultados reais.</div>
  </div>
  <div class="feat-list" style="animation:fadeUp 1s .15s ease both">
    <div class="feat-row"><span>📄</span><span>Protocolos dos seus 20 PDFs de treino</span></div>
    <div class="feat-row"><span>🤖</span><span>Coach IA personalizado para seus objetivos</span></div>
    <div class="feat-row"><span>🍎</span><span>Receitas Anabólicas Premium + Guia Detox</span></div>
    <div class="feat-row"><span>🏋️</span><span>Biblioteca completa por grupo muscular</span></div>
  </div>
  <button class="btn btn-acc" style="max-width:360px;width:100%;animation:fadeUp 1s .3s ease both;font-size:16px" onclick="startOnboarding()">COMEÇAR AGORA →</button>
</div>

<!-- ═══ ONBOARDING ═══════════════════════════════════════════ -->
<div id="onboarding">
  <div class="steps-bar" id="steps-bar"></div>
  <div id="ob-content"></div>
  <div style="display:flex;gap:10px;margin-top:24px" id="ob-btns"></div>
</div>

<!-- ═══ PÁGINAS ══════════════════════════════════════════════ -->
<div class="page active" id="page-home"></div>
<div class="page" id="page-workouts"></div>
<div class="page" id="page-library"></div>
<div class="page" id="page-recipes"></div>
<div class="page" id="page-ai">
  <div class="ai-header">
    <div style="font-size:22px;font-weight:900;margin-bottom:2px">Coach IA</div>
    <div class="ai-status"><span class="ai-dot"></span>Treinado com seus 20 PDFs</div>
  </div>
  <div id="chat-wrap" class="chat-wrap" style="height:calc(100vh - 200px - var(--sat) - var(--sab))"></div>
  <div class="ai-input-wrap">
    <div class="quick-btns" id="quick-btns"></div>
    <div class="ai-input-row" style="margin-top:8px">
      <input class="ai-input" id="ai-input" placeholder="Pergunte ao Coach IA..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="ai-send" id="ai-send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
<div class="page" id="page-progress"></div>

<!-- ═══ TREINO ATIVO ══════════════════════════════════════════ -->
<div id="active-workout"></div>

<!-- ═══ DETALHE EXERCÍCIO ════════════════════════════════════ -->
<div id="ex-detail"></div>

function renderOnboarding(){
  const s=OB_STEPS[S.obStep];
  const last=S.obStep===OB_STEPS.length-1;
  const bar=OB_STEPS.map((_,i)=>`<div class="step-seg${i<=S.obStep?' done':''}"></div>`).join('');
  el('steps-bar').innerHTML=bar;
  el('ob-content').innerHTML=`
    <div style="margin-bottom:20px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--mut);margin-bottom:4px">PASSO ${S.obStep+1}/${OB_STEPS.length}</div>
      <div style="font-size:24px;font-weight:900;margin-bottom:3px">${s.title}</div>
      <div style="font-size:13px;color:var(--mut)">${s.sub}</div>
    </div>
    ${s.render()}`;
  el('ob-btns').innerHTML=`
    ${S.obStep>0?`<button class="btn btn-ghost" style="flex:1" onclick="obBack()">← Voltar</button>`:''}
    <button class="btn btn-acc" style="flex:2" onclick="obNext()">${last?'🚀 GERAR MEU PLANO':'Continuar →'}</button>`;
}

function obSaveStep(){
  const g=id=>el(id);
  if(g('ob-name'))S.user.name=g('ob-name').value;
  if(g('ob-age'))S.user.age=g('ob-age').value;
  if(g('ob-weight'))S.user.weight=g('ob-weight').value;
  if(g('ob-height'))S.user.height=g('ob-height').value;
  if(g('ob-sex'))S.user.sex=g('ob-sex').value;
  if(g('ob-days'))S.user.days=g('ob-days').value;
  if(g('ob-dur'))S.user.duration=g('ob-dur').value;
  if(g('ob-loc'))S.user.location=g('ob-loc').value;
  if(g('ob-inj'))S.user.injuries=g('ob-inj').value;
  if(g('ob-sleep'))S.user.sleep=g('ob-sleep').value;
  if(g('ob-stress'))S.user.stress=g('ob-stress').value;
}

function obNext(){
  obSaveStep();
  if(S.obStep===0&&!S.user.name){showToast('⚠️ Digite seu nome');return}
  if(S.obStep===1&&!S.user.goal){showToast('⚠️ Selecione seu objetivo');return}
  if(S.obStep===2&&!S.user.days){showToast('⚠️ Selecione sua disponibilidade');return}
  if(S.obStep<OB_STEPS.length-1){S.obStep++;renderOnboarding()}
  else{
    save('volt_user',S.user);
    el('onboarding').style.display='none';
    el('nav').style.display='flex';
    initApp();
    showPage('home');
    showToast('🎉 Plano criado! Bem-vindo, '+S.user.name.split(' ')[0]+'!');
  }
}
function obBack(){if(S.obStep>0){obSaveStep();S.obStep--;renderOnboarding()}}

function startWorkout(wk){
  if(typeof wk==='string')wk=JSON.parse(wk);
  S.awWorkout=wk; S.awCur=0; S.awSetN=1; S.awDone=[]; S.awElapsed=0; S.awResting=false; S.awRestT=0;
  clearInterval(S.awTimer); clearInterval(S.awRestTimer);
  S.awTimer=setInterval(()=>{S.awElapsed++;updateAWTimer()},1000);
  renderAW();
  el('active-workout').style.display='block';
}

function stopWorkout(){
  clearInterval(S.awTimer); clearInterval(S.awRestTimer);
  el('active-workout').style.display='none';
  S.awWorkout=null;
}

function fmtTime(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

function updateAWTimer(){el('aw-timer')&&(el('aw-timer').textContent=fmtTime(S.awElapsed))}

    </div>`:''}

    <div class="ex-card">

        <div class="log-grid">

            <div class="log-label">PESO (KG)</div>
            <input class="log-input" type="number" id="aw-weight" placeholder="0" inputmode="decimal"/>
          </div>
          <div class="log-field">
            <div class="log-label">REPS FEITAS</div>
            <input class="log-input" type="number" id="aw-reps" placeholder="${ex.reps}" inputmode="numeric"/>
          </div>
        </div>
        <button class="btn${S.awResting?' btn-ghost':' btn-acc'}" id="aw-complete-btn" onclick="awCompleteSet()" ${S.awResting?'disabled':''}>
          ${S.awResting?`DESCANSANDO ${fmtTime(S.awRestT)}`:(S.awSetN<totalSets?`✓ CONCLUIR SÉRIE ${S.awSetN}`:'→ PRÓXIMO EXERCÍCIO')}
        </button>
      </div>
    </div>

    <div class="aw-ex-list">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--mut);margin-bottom:8px">LISTA DE EXERCÍCIOS</div>
      ${wk.exercises.map((e,i)=>{
        const isDone=S.awDone.includes(i);
        const isCur=i===S.awCur;
        return`<div class="aw-ex-item" style="${isCur?'border-color:rgba(200,255,0,.4);background:var(--glow2)':''}">
          <div class="aw-ex-num ${isDone?'aw-ex-done':isCur?'aw-ex-cur':'aw-ex-pend'}">${isDone?'✓':(i+1)}</div>
          <div class="flex1">
            <div class="aw-ex-name" style="${isDone?'opacity:.5;text-decoration:line-through':''}">${e.name}</div>
            <div class="aw-ex-sub">${e.sets}s × ${e.reps}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function awCompleteSet(){
  if(S.awResting)return;
  const wk=S.awWorkout;
  const ex=wk.exercises[S.awCur];
  const totalSets=parseInt(ex.sets)||3;
  if(S.awSetN<totalSets){
    S.awRestT=60; S.awResting=true;
    S.awSetN++;
    renderAW();
    clearInterval(S.awRestTimer);
    S.awRestTimer=setInterval(()=>{
      S.awRestT--;
      const rt=el('aw-rest-time');
      const cb=el('aw-complete-btn');
      if(rt)rt.textContent=fmtTime(S.awRestT);
      if(cb)cb.textContent=`DESCANSANDO ${fmtTime(S.awRestT)}`;
      if(S.awRestT<=0){
        clearInterval(S.awRestTimer);
        S.awResting=false;
        renderAW();
      }
    },1000);
  } else {
    S.awDone=[...S.awDone,S.awCur];
    if(S.awCur+1<wk.exercises.length){S.awCur++;S.awSetN=1;renderAW();}
    else{
      clearInterval(S.awTimer);
      const dur=S.awElapsed;
      el('active-workout').style.display='none';
      S.awWorkout=null;
      showToast(`🎉 Treino concluído em ${fmtTime(dur)}! +180 XP`);
      showPage('home');
    }
  }
}

function skipRest(){
  clearInterval(S.awRestTimer);
  S.awResting=false;
  renderAW();
}

const QUICK=['Qual split é melhor para mim?','Monte meu treino de hoje','Receita pré-treino','Como melhorar meu agachamento?','Protocolo de mobilidade'];

function renderAI(){
  const u=S.user;
  const name=(u.name||'Atleta').split(' ')[0];
  if(S.chatMsgs.length===0){
    S.chatMsgs=[{role:'bot',text:`Olá, ${name}! 👋 Sou seu Coach IA, treinado com os protocolos dos seus 20 PDFs.\n\nObjetivo: ${goalLabel(u.goal)} · ${u.days||'4 dias'}/semana\n\nComo posso ajudar hoje?`}];
  }
  renderChat();
  const qw=el('quick-btns');
  qw.innerHTML=QUICK.map(q=>`<button class="quick-btn" onclick="setInput('${q.replace(/'/g,"\\'")}')">${q}</button>`).join('');
}

function goalLabel(g){
  const m={hypertrophy:'Hipertrofia',fat_loss:'Emagrecimento',recomp:'Recomposição',strength:'Força',conditioning:'Condicionamento',mobility:'Mobilidade'};
  return m[g]||'Condicionamento';
}

function renderChat(){
  const wrap=el('chat-wrap'); if(!wrap)return;
  wrap.innerHTML=S.chatMsgs.map(m=>`
    <div class="msg-row${m.role==='user'?' user':''}">
      ${m.role==='bot'?'<div class="msg-avatar">🤖</div>':''}
      <div class="msg-bubble ${m.role==='bot'?'bot':'user'}">${m.text}</div>
    </div>`).join('');
  if(S.chatLoading){
    wrap.innerHTML+=`<div class="msg-row"><div class="msg-avatar">🤖</div><div class="msg-bubble bot"><div class="typing">${[0,1,2].map(i=>`<div class="typing-dot" style="animation-delay:${i*.2}s"></div>`).join('')}</div></div></div>`;
  }
  wrap.scrollTop=wrap.scrollHeight;
}

function setInput(v){const i=el('ai-input');if(i){i.value=v;i.focus()}}

async function sendMsg(){
  const input=el('ai-input'); if(!input)return;
  const text=input.value.trim(); if(!text||S.chatLoading)return;
  input.value='';
  S.chatMsgs.push({role:'user',text});
  S.chatLoading=true;
  renderChat();

  const u=S.user;
  const sys=`Você é Personal Trainer e Nutricionista especializado integrado ao app VOLT.
Materiais: Treinos Hipertrofia Homem (ABC/ABCD/ABCDE), Mulher (ABC/ABCD), Emagrecimento ABC, Funcional/Cardio, Mobilidade, Biblioteca de exercícios, Receitas Anabólicas Premium, Guia Detox.
Protocolos: Hipertrofia=3-4 séries×10-12 reps×1min. Emagrecimento=15-30 reps×45s. Mobilidade=30s×1min.
Atleta: ${u.name||'Usuário'}, ${u.age||30} anos, ${u.height||175}cm, ${u.weight||80}kg, ${u.sex||'Masculino'}.
Objetivo: ${goalLabel(u.goal)}. Dias: ${u.days||'4 dias'}. Lesões: ${u.injuries||'Nenhuma'}.
Responda SEMPRE em português do Brasil. Seja específico e prático. Máx 160 palavras.`;

  try{
    const history=S.chatMsgs.slice(0,-1).map(m=>({role:m.role==='bot'?'assistant':'user',content:m.text}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,
        messages:[...history,{role:'user',content:text}]})
    });
    const data=await res.json();
    S.chatMsgs.push({role:'bot',text:data.content?.[0]?.text||'Erro na resposta.'});
  }catch{
    S.chatMsgs.push({role:'bot',text:'Erro de conexão. Verifique sua internet e tente novamente.'});
  }
  S.chatLoading=false;
  renderChat();
}

function sparkline(data,color){
  const w=280,h=55,mn=Math.min(...data),mx=Math.max(...data);
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((v-mn)/(mx-mn+.001))*(h-8)-4;
    return`${x},${y}`;
  }).join(' ');
  const last=pts.trim().split(' ').pop().split(',');
  const area=`0,${h} ${pts} ${w},${h}`;
  return`<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="sg${Math.random().toString(36).slice(2)}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${area}" fill="url(#sg${Math.random().toString(36).slice(2)})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3" fill="${color}"/>
  </svg>`;
}
